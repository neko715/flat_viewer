<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>楽譜ビューア</title>
<style>
  :root {
    --bg: #ffffff;
    --bg-soft: #f7f8fa;
    --border: #e6e8eb;
    --text: #1a1d21;
    --text-sub: #6b7280;
    --accent: #3981FF;
    --accent-soft: #eaf1ff;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
    --shadow-hover: 0 8px 24px rgba(57,129,255,0.12), 0 2px 6px rgba(0,0,0,0.05);
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", "Inter", "Helvetica Neue", Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  #app {
    height: 100vh;
    width: 100vw;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ---------- メニュー画面 ---------- */
  #menu-screen {
    height: 100%;
    width: 100%;
    display: flex;
    flex-direction: column;
    overflow-y: auto;
  }

  .menu-header {
    padding: 40px 24px 16px;
    text-align: center;
    flex-shrink: 0;
  }

  .menu-header h1 {
    font-size: 26px;
    font-weight: 700;
    margin: 0 0 6px;
    letter-spacing: 0.02em;
  }

  .menu-header p {
    margin: 0;
    color: var(--text-sub);
    font-size: 14px;
  }

  .menu-header .service-desc {
    margin: 6px 0 0;
    color: var(--text-sub);
    font-size: 11px;
    opacity: 0.8;
  }

  .menu-grid {
    flex: 1;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 16px;
    padding: 24px 32px 48px;
    max-width: 1200px;
    margin: 0 auto;
    width: 100%;
  }

  .song-card {
    background: var(--bg-soft);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 22px 20px;
    cursor: pointer;
    text-align: left;
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
    box-shadow: var(--shadow);
    transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease, background 0.15s ease;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }

  .song-card:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow-hover);
    border-color: var(--accent);
    background: var(--accent-soft);
  }

  .song-card:active {
    transform: translateY(0px) scale(0.99);
  }

  .song-card .icon {
    flex-shrink: 0;
    width: 34px;
    height: 34px;
    border-radius: 10px;
    background: var(--accent);
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
  }

  .song-card .title {
    flex: 1;
    line-height: 1.4;
  }

  /* ---------- 譜面画面 ---------- */
  #score-screen {
    height: 100%;
    width: 100%;
    display: none;
    flex-direction: column;
    position: relative;
  }

  .score-topbar {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(6px);
    z-index: 10;
  }

  .back-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    border: 1px solid var(--border);
    background: var(--bg-soft);
    color: var(--text);
    font-size: 14px;
    font-weight: 600;
    padding: 8px 14px;
    border-radius: 999px;
    cursor: pointer;
    transition: background 0.15s ease, border-color 0.15s ease, transform 0.1s ease;
  }

  .back-btn:hover {
    background: var(--accent-soft);
    border-color: var(--accent);
    color: var(--accent);
  }

  .back-btn:active {
    transform: scale(0.97);
  }

  .back-btn svg {
    width: 16px;
    height: 16px;
  }

  .score-title {
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex-shrink: 1;
  }

  .fullscreen-btn {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 34px;
    height: 34px;
    border: 1px solid var(--border);
    background: var(--bg-soft);
    color: var(--text);
    border-radius: 999px;
    cursor: pointer;
    transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease, transform 0.1s ease;
  }

  .fullscreen-btn svg {
    width: 16px;
    height: 16px;
  }

  .fullscreen-btn:hover {
    background: var(--accent-soft);
    border-color: var(--accent);
    color: var(--accent);
  }

  .fullscreen-btn:active {
    transform: scale(0.95);
  }

  .score-body {
    flex: 1;
    overflow-y: auto;
    background: var(--bg);
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .score-body iframe {
    width: 100%;
    border: none;
    border-radius: 10px;
    box-shadow: var(--shadow);
    display: block;
    flex: 1 1 auto;
    min-height: 300px;
  }

  /* 1つの譜面のみのときは画面いっぱいに */
  .score-body.single {
    padding: 0;
  }
  .score-body.single iframe {
    border-radius: 0;
    box-shadow: none;
    height: 100%;
  }

  .part-label {
    font-size: 12px;
    font-weight: 700;
    color: var(--accent);
    padding: 0 4px;
  }

  .flat-credit {
    font-size: 11px;
    color: var(--accent);
    padding: 0 4px;
    font-family: Inter, "Helvetica Neue", Helvetica, Arial, sans-serif;
  }
  .flat-credit a {
    color: var(--accent);
    text-decoration: none;
  }
</style>
</head>
<body>

<div id="app">

  <!-- メニュー画面 -->
  <div id="menu-screen">
    <div class="menu-header">
      <h1>♪ 楽譜ライブラリ</h1>
      <p>曲を選んでください</p>
      <p class="service-desc">ギター部で利用する楽譜を整理・検索・共有するためのサービスです。</p>
    </div>
    <div class="menu-grid" id="menu-grid"></div>
  </div>

  <!-- 譜面画面 -->
  <div id="score-screen">
    <div class="score-topbar">
      <button class="back-btn" id="back-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"></polyline>
        </svg>
        戻る
      </button>
      <div class="score-title" id="score-title"></div>
      <button class="fullscreen-btn" id="fullscreen-btn" title="全画面表示">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 3 21 3 21 9"></polyline>
          <polyline points="9 21 3 21 3 15"></polyline>
          <line x1="21" y1="3" x2="14" y2="10"></line>
          <line x1="3" y1="21" x2="10" y2="14"></line>
        </svg>
      </button>
    </div>
    <div class="score-body" id="score-body"></div>
  </div>

</div>

<script>
  // 曲データ
  const songs = [ ];

  const menuGrid = document.getElementById("menu-grid");
  const menuScreen = document.getElementById("menu-screen");
  const scoreScreen = document.getElementById("score-screen");
  const scoreTitle = document.getElementById("score-title");
  const scoreBody = document.getElementById("score-body");
  const backBtn = document.getElementById("back-btn");
  const fullscreenBtn = document.getElementById("fullscreen-btn");

  // メニューを生成
  songs.forEach(song => {
    const card = document.createElement("button");
    card.className = "song-card";
    card.innerHTML = `
      <span class="title">${song.title}</span>
      <span class="icon">♪</span>
    `;
    card.addEventListener("click", () => openScore(song));
    menuGrid.appendChild(card);
  });

  function openScore(song) {
    scoreTitle.textContent = song.title;
    scoreBody.innerHTML = "";
    scoreBody.classList.toggle("single", song.parts.length === 1);

    song.parts.forEach(part => {
      if (part.label) {
        const label = document.createElement("div");
        label.className = "part-label";
        label.textContent = part.label;
        scoreBody.appendChild(label);
      }
      const wrapper = document.createElement("div");
      wrapper.innerHTML = part.embed;
      scoreBody.appendChild(wrapper.firstElementChild);
    });

    menuScreen.style.display = "none";
    scoreScreen.style.display = "flex";
    scoreBody.scrollTop = 0;
  }

  function closeScore() {
    scoreScreen.style.display = "none";
    menuScreen.style.display = "flex";
    scoreBody.innerHTML = "";
  }

  backBtn.addEventListener("click", closeScore);

  function toggleFullscreen() {
    if (!document.fullscreenElement) {
      const target = scoreScreen;
      if (target.requestFullscreen) {
        target.requestFullscreen();
      } else if (target.webkitRequestFullscreen) {
        target.webkitRequestFullscreen();
      }
    } else {
      if (document.exitFullscreen) {
        document.exitFullscreen();
      } else if (document.webkitExitFullscreen) {
        document.webkitExitFullscreen();
      }
    }
  }

  fullscreenBtn.addEventListener("click", toggleFullscreen);
</script>

</body>
</html>
